<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer"> <title>Sorgu v4</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; padding: 20px; text-align: center; }
        input, select, button { background: #111; color: #0f0; border: 1px solid #0f0; padding: 10px; margin: 10px; width: 80%; max-width: 400px; }
        #sonuc { text-align: left; background: #050505; border: 1px dashed #0f0; padding: 15px; margin-top: 20px; display: none; }
    </style>
</head>
<body>

    <h2>TERMINAL SORGULAMA</h2>
    
    <select id="kat">
        <option value="tcgsm.php?tc=">TC'den GSM</option>
        <option value="sulale.php?tc=">Sülale</option>
        <option value="adres.php?tc=">Adres</option>
        <option value="gsmtc.php?gsm=">GSM'den TC</option>
    </select><br>

    <input type="text" id="veri" placeholder="Numara veya TC Girin"><br>
    <button onclick="sorgula()">ISTEGI GONDER</button>

    <div id="sonuc"></div>

<script>
    async function sorgula() {
        const kat = document.getElementById('kat').value;
        const veri = document.getElementById('veri').value;
        const sonuc = document.getElementById('sonuc');
        
        const url = `https://arastir.sbs/api/${kat}${veri}`;
        
        sonuc.style.display = "block";
        sonuc.innerText = "Sinyal gönderiliyor...";

        try {
            // AllOrigins yerine Proxy.io deniyoruz, bu daha esnektir
            const proxy = "https://corsproxy.io/?" + encodeURIComponent(url);
            
            const response = await fetch(proxy);
            const data = await response.text(); // JSON yerine text olarak alalım, hata varsa görelim

            try {
                const jsonData = JSON.parse(data);
                sonuc.innerText = JSON.stringify(jsonData, null, 4);
            } catch(e) {
                // Eğer JSON değilse gelen ham metni göster (Hata mesajı olabilir)
                sonuc.innerText = "Gelen Yanıt:\n" + data;
            }
        } catch (err) {
            sonuc.innerText = "Bağlantı reddedildi. VPN açık mı?\nDetay: " + err.message;
        }
    }
</script>
</body>
</html>
