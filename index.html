<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRAİN SORGU PANELİ</title>
    <style>
        /* Genel Stil Düzeltmeleri */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: white;
        }

        /* Sayfa Yüklenirken Boş Gözükmemesi İçin Ana Konteyner */
        #app-container > div {
            display: none; /* Başlangıçta her şeyi gizle, JS ile sırayla açacağız */
        }

        /* Hoş Geldin Yazısının Görünmesi İçin Boşluk */
        #main-content {
            padding: 80px 20px 20px 20px; /* Üstten 80px boşluk bırakıldı */
            text-align: center;
        }

        /* İstatistik Kartları */
        .stats-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 12px;
            min-width: 150px;
            border: 1px solid #333;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .stat-card h3 {
            margin: 0;
            font-size: 14px;
            color: #aaa;
            text-transform: uppercase;
        }

        .stat-card p {
            margin: 10px 0 0;
            font-size: 24px;
            font-weight: bold;
            color: #00ff00;
        }

        /* Auth ve Telegram Ekranları */
        .centered-screen {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .btn-primary {
            background-color: #0088cc;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="app-container">
        <div id="auth-screen" class="centered-screen">
            <h2>DRAİN PANEL - Giriş Yap</h2>
            <input type="email" id="email" placeholder="E-posta">
            <input type="password" id="password" placeholder="Şifre">
            <button onclick="login()" class="btn-primary" style="margin-top:10px;">Giriş Yap / Kayıt Ol</button>
        </div>

        <div id="telegram-screen" class="centered-screen">
            <h2>DUR! Önce Kanala Katıl</h2>
            <p>Paneli kullanmak için Telegram kanalımıza abone olmalısınız.</p>
            <a href="https://t.me/KanalLinkin" target="_blank" class="btn-primary" onclick="verifyTelegram()">Kanala Katıldım</a>
        </div>

        <div id="main-content">
            <h1>Hoş Geldin, <span id="user-display-name">Kullanıcı</span>!</h1>
            
            <div class="stats-container">
                <div class="stat-card">
                    <h3>Toplam Üye</h3>
                    <p id="total-users">Hesaplanıyor...</p>
                </div>
                <div class="stat-card">
                    <h3>Aktif Kullanıcı</h3>
                    <p id="active-users">1</p>
                </div>
            </div>

            </div>
    </div>

    <script>
        // Sayfa yüklendiğinde akışı yöneten ana fonksiyon
        function manageFlow(user) {
            const authScreen = document.getElementById('auth-screen');
            const telegramScreen = document.getElementById('telegram-screen');
            const mainContent = document.getElementById('main-content');

            // Her şeyi önce gizle
            authScreen.style.display = 'none';
            telegramScreen.style.display = 'none';
            mainContent.style.display = 'none';

            if (!user) {
                // Giriş yapmamışsa sadece giriş ekranı
                authScreen.style.display = 'flex';
            } else {
                // Giriş yapmışsa Telegram kontrolü (Simüle ediliyor)
                const isTelegramJoined = localStorage.getItem('telegramJoined') === 'true';

                if (!isTelegramJoined) {
                    telegramScreen.style.display = 'flex';
                } else {
                    // Her şey tamamsa ana içeriği göster
                    mainContent.style.display = 'block';
                    document.getElementById('user-display-name').innerText = user.email.split('@')[0];
                    loadStats();
                }
            }
        }

        function verifyTelegram() {
            // Kullanıcı butona basınca katılmış kabul ediyoruz (LocalStorage şimdilik çözüm)
            localStorage.setItem('telegramJoined', 'true');
            location.reload();
        }

        function loadStats() {
            // Buraya gerçek Firebase verileri bağlanabilir
            document.getElementById('total-users').innerText = "128"; // Örnek sayı
            document.getElementById('active-users').innerText = Math.floor(Math.random() * 10) + 1;
        }

        // Firebase Auth Dinleyicisi (Örnek Yapı)
        /* auth.onAuthStateChanged((user) => {
            manageFlow(user);
        });
        */
        
        // Şimdilik test için (User yokmuş gibi başlar):
        manageFlow(null); 
    </script>
</body>
</html>
