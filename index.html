<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>DRAİN SORGU PANELİ</title>
    <style>
        :root {
            --primary: #3b82f6;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f1f5f9;
            --border: #334155;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
        }

        .container {
            background: var(--card);
            width: 100%;
            max-width: 600px;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
        }

        h1 {
            text-align: center;
            font-size: 24px;
            background: linear-gradient(90deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }

        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 13px; color: #94a3b8; }

        select, input {
            width: 100%;
            padding: 12px;
            background: #0f172a;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        /* Veri Tablosu Stili */
        #result-area {
            margin-top: 25px;
            display: none;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            background: #0f172a;
            border-radius: 8px;
            overflow: hidden;
        }

        .data-row {
            border-bottom: 1px solid var(--border);
            display: flex;
            padding: 12px;
        }

        .data-key {
            flex: 1;
            color: #60a5fa;
            font-weight: bold;
            text-transform: capitalize;
            font-size: 14px;
        }

        .data-value {
            flex: 2;
            color: #cbd5e1;
            font-size: 14px;
        }

        .hidden { display: none; }
        .loader { text-align: center; color: #60a5fa; margin: 20px 0; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>DRAİN SORGU PANELİ</h1>
    
    <div class="input-group">
        <label>Sorgu Türü</label>
        <select id="category" onchange="updateUI()">
            <option value="tcgsm.php?tc=">TC'den GSM</option>
            <option value="sulale.php?tc=">Sülale</option>
            <option value="adres.php?tc=">Adres</option>
            <option value="adsoyad">Ad Soyad</option>
            <option value="gsmtc.php?gsm=">GSM'den TC</option>
        </select>
    </div>

    <div id="single-input" class="input-group">
        <label id="main-label">Bilgi Giriniz</label>
        <input type="text" id="main-val" placeholder="Sorgulanacak veriyi yazın...">
    </div>

    <div id="multi-input" class="input-group hidden">
        <input type="text" id="fname" placeholder="Ad" style="margin-bottom: 10px;">
        <input type="text" id="lname" placeholder="Soyad" style="margin-bottom: 10px;">
        <input type="text" id="city" placeholder="İl" style="margin-bottom: 10px;">
        <input type="text" id="dist" placeholder="İlçe">
    </div>

    <button onclick="startSorgu()">Sorgula</button>
    
    <div id="loading" class="loader">Veriler Düzenleniyor...</div>

    <div id="result-area">
        <div id="table-content" class="data-table"></div>
    </div>
</div>

<script>
    function updateUI() {
        const cat = document.getElementById('category').value;
        document.getElementById('single-input').classList.toggle('hidden', cat === 'adsoyad');
        document.getElementById('multi-input').classList.toggle('hidden', cat !== 'adsoyad');
    }

    async function startSorgu() {
        const cat = document.getElementById('category').value;
        const resArea = document.getElementById('result-area');
        const table = document.getElementById('table-content');
        const loader = document.getElementById('loading');
        
        let url = "";
        if (cat === 'adsoyad') {
            url = `https://arastir.sbs/api/adsoyad.php?adi=${document.getElementById('fname').value}&soyadi=${document.getElementById('lname').value}&il=${document.getElementById('city').value}&ilce=${document.getElementById('dist').value}`;
        } else {
            url = `https://arastir.sbs/api/${cat}${document.getElementById('main-val').value}`;
        }

        resArea.style.display = "none";
        loader.style.display = "block";
        table.innerHTML = "";

        try {
            const proxy = "https://corsproxy.io/?" + encodeURIComponent(url);
            const response = await fetch(proxy);
            const rawData = await response.text();
            const data = JSON.parse(rawData);

            loader.style.display = "none";
            resArea.style.display = "block";

            // Veriyi Tabloya Dönüştürme Mantığı
            if (Array.isArray(data)) {
                data.forEach((item, index) => {
                    let header = document.createElement('div');
                    header.style = "padding: 10px; background: #334155; font-weight: bold; font-size: 12px;";
                    header.innerText = `KAYIT #${index + 1}`;
                    table.appendChild(header);
                    buildRows(item, table);
                });
            } else {
                buildRows(data, table);
            }

        } catch (e) {
            loader.style.display = "none";
            resArea.style.display = "block";
            table.innerHTML = "<div style='padding:20px; color:#f87171;'>Hata: Veri çekilemedi veya API yanıt vermedi. VPN kontrol edin.</div>";
        }
    }

    function buildRows(obj, container) {
        for (let key in obj) {
            if (typeof obj[key] === 'object' && obj[key] !== null) {
                buildRows(obj[key], container); // İç içe veriler varsa onları da çıkarır
            } else {
                let row = document.createElement('div');
                row.className = "data-row";
                row.innerHTML = `<div class="data-key">${key.replace('_', ' ')}:</div><div class="data-value">${obj[key]}</div>`;
                container.appendChild(row);
            }
        }
    }
</script>

</body>
</html>
