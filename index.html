<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>DRAİN SORGU PANELİ</title>
    <style>
        :root {
            --primary: #3b82f6;
            --bg: #0b0f1a;
            --card: #161e2d;
            --text: #f1f5f9;
            --border: #1e293b;
            --accent: #60a5fa;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
        }

        .container {
            background: var(--card);
            width: 100%;
            max-width: 650px;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border);
        }

        h1 {
            text-align: center;
            font-size: 26px;
            font-weight: 800;
            background: linear-gradient(135deg, #60a5fa 0%, #c084fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 14px; font-weight: 600; color: #94a3b8; }

        select, input {
            width: 100%;
            padding: 14px;
            background: #0b0f1a;
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            box-sizing: border-box;
            font-size: 15px;
            transition: all 0.2s;
        }

        input:focus { border-color: var(--primary); outline: none; }

        button {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        button:hover { background: #2563eb; transform: translateY(-1px); }

        #result-area { margin-top: 30px; display: none; }

        /* Kayıt Kartı Stili */
        .person-card {
            background: #1e293b;
            border-radius: 14px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .card-header {
            background: #2d3748;
            padding: 12px 20px;
            font-weight: bold;
            font-size: 14px;
            color: var(--accent);
            border-bottom: 1px solid var(--border);
        }

        .info-row {
            display: flex;
            padding: 12px 20px;
            border-bottom: 1px solid #2d3748;
        }

        .info-row:last-child { border-bottom: none; }

        .info-label {
            flex: 1;
            font-weight: 600;
            color: #94a3b8;
            font-size: 13px;
        }

        .info-value {
            flex: 2;
            color: #e2e8f0;
            font-size: 14px;
        }

        .hidden { display: none; }
        .loader { text-align: center; color: var(--accent); margin: 20px 0; display: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>DRAİN SORGU PANELİ</h1>
    
    <div class="input-group">
        <label>Sorgu Türü</label>
        <select id="category" onchange="updateUI()">
            <option value="tcgsm.php?tc=">TC'den GSM Sorgu</option>
            <option value="sulale.php?tc=">Sülale Sorgu</option>
            <option value="adres.php?tc=">Adres Sorgu</option>
            <option value="adsoyad">Ad Soyad Sorgu</option>
            <option value="gsmtc.php?gsm=">GSM'den TC Sorgu</option>
        </select>
    </div>

    <div id="single-input" class="input-group">
        <label id="main-label">Sorgulanacak Bilgi</label>
        <input type="text" id="main-val" placeholder="Buraya yazın...">
    </div>

    <div id="multi-input" class="input-group hidden">
        <input type="text" id="fname" placeholder="Ad" style="margin-bottom:10px">
        <input type="text" id="lname" placeholder="Soyad" style="margin-bottom:10px">
        <input type="text" id="city" placeholder="İl" style="margin-bottom:10px">
        <input type="text" id="dist" placeholder="İlçe">
    </div>

    <button onclick="startSorgu()">Sorgula</button>
    
    <div id="loading" class="loader">Veriler Analiz Ediliyor...</div>

    <div id="result-area"></div>
</div>

<script>
    // Teknik kelimeleri Türkçeleştirme sözlüğü
    const sozluk = {
        "AD": "Ad",
        "SOYAD": "Soyad",
        "TC": "TC Kimlik No",
        "DOGUMTARIHI": "Doğum Tarihi",
        "NUFUSIL": "Nüfus İl",
        "NUFUSILCE": "Nüfus İlçe",
        "ANNEADI": "Anne Adı",
        "BABAADI": "Baba Adı",
        "GSM": "Telefon Numarası",
        "ADRES": "İkametgah Adresi",
        "UYRUK": "Uyruk",
        "CINSIYET": "Cinsiyet"
    };

    function updateUI() {
        const cat = document.getElementById('category').value;
        document.getElementById('single-input').classList.toggle('hidden', cat === 'adsoyad');
        document.getElementById('multi-input').classList.toggle('hidden', cat !== 'adsoyad');
    }

    async function startSorgu() {
        const cat = document.getElementById('category').value;
        const resArea = document.getElementById('result-area');
        const loader = document.getElementById('loading');
        
        let url = "";
        if (cat === 'adsoyad') {
            url = `https://arastir.sbs/api/adsoyad.php?adi=${document.getElementById('fname').value}&soyadi=${document.getElementById('lname').value}&il=${document.getElementById('city').value}&ilce=${document.getElementById('dist').value}`;
        } else {
            url = `https://arastir.sbs/api/${cat}${document.getElementById('main-val').value}`;
        }

        resArea.style.display = "none";
        resArea.innerHTML = "";
        loader.style.display = "block";

        try {
            const proxy = "https://corsproxy.io/?" + encodeURIComponent(url);
            const response = await fetch(proxy);
            const rawData = await response.text();
            const data = JSON.parse(rawData);

            loader.style.display = "none";
            resArea.style.display = "block";

            // Eğer dizi (birden fazla sonuç) geldiyse hepsini kart olarak bas
            if (Array.isArray(data)) {
                data.forEach((item, index) => renderCard(item, index + 1));
            } else {
                renderCard(data, 1);
            }

        } catch (e) {
            loader.style.display = "none";
            resArea.style.display = "block";
            resArea.innerHTML = "<div style='padding:20px; color:#f87171; text-align:center;'>Hata: Veri bulunamadı veya VPN kapalı.</div>";
        }
    }

    function renderCard(obj, count) {
        const resArea = document.getElementById('result-area');
        
        // Kartı oluştur
        let card = document.createElement('div');
        card.className = "person-card";
        
        let header = document.createElement('div');
        header.className = "card-header";
        header.innerText = `SONUÇ KAYDI #${count}`;
        card.appendChild(header);

        // Gereksiz teknik verileri filtrele ve Türkçeleştir
        for (let key in obj) {
            let value = obj[key];
            
            // Gizlenecek teknik alanlar
            if (["success", "message", "status", "count"].includes(key.toLowerCase())) continue;
            if (value === null || value === "") continue;

            let row = document.createElement('div');
            row.className = "info-row";
            
            // Sözlükte varsa Türkçesini kullan, yoksa kelimeyi düzelt
            let labelText = sozluk[key.toUpperCase()] || key.replace('_', ' ').toUpperCase();
            
            row.innerHTML = `
                <div class="info-label">${labelText}</div>
                <div class="info-value">${value}</div>
            `;
            card.appendChild(row);
        }
        
        resArea.appendChild(card);
    }
</script>

</body>
</html>
