<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>DRAİN PANEL | ULTIMATE</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.4);
            --bg-dark: #020617;
            --sidebar-bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-dark); color: var(--text-main); overflow-x: hidden; }

        #auth-screen, #join-lock {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark); z-index: 100001;
            display: none; justify-content: center; align-items: center; padding: 20px;
        }
        #join-lock { z-index: 99999; }

        .lock-card {
            background: var(--sidebar-bg); border: 1px solid var(--primary);
            border-radius: 24px; padding: 32px; text-align: center; max-width: 400px;
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.2);
        }

        .navbar {
            height: 70px; background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex; align-items: center; padding: 0 24px;
            position: fixed; top: 0; width: 100%; z-index: 100;
        }
        .menu-toggle { font-size: 20px; cursor: pointer; color: var(--primary); margin-right: 20px; }
        .brand { font-weight: 800; font-size: 20px; background: linear-gradient(to right, #60a5fa, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .sidebar {
            position: fixed; left: -280px; top: 0; width: 280px; height: 100%;
            background: var(--sidebar-bg); z-index: 200; padding: 24px;
            border-right: 1px solid rgba(59, 130, 246, 0.2); transition: var(--transition);
            overflow-y: auto;
        }
        .sidebar.active { left: 0; box-shadow: 20px 0 50px rgba(0,0,0,0.5); }
        .sidebar-user { display: flex; align-items: center; gap: 15px; padding-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.05); margin-bottom: 24px; }
        .avatar { width: 45px; height: 45px; background: var(--primary-glow); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: var(--primary); border: 1px solid var(--primary); }

        .sidebar-label { font-size: 11px; color: var(--text-dim); font-weight: 800; margin: 20px 0 10px 10px; text-transform: uppercase; letter-spacing: 1.5px; }
        .nav-link { padding: 12px 16px; display: flex; align-items: center; gap: 12px; color: var(--text-dim); text-decoration: none; border-radius: 12px; transition: var(--transition); margin-bottom: 4px; cursor: pointer; }
        .nav-link:hover, .nav-link.active { background: rgba(59, 130, 246, 0.1); color: #fff; }

        .main { margin-top: 100px; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 600px; animation: fadeInUp 0.8s ease-out; }
        .card { background: var(--card-bg); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; padding: 32px; }
        input { width: 100%; padding: 16px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; color: #fff; margin-bottom: 15px; font-family: inherit; outline: none; }
        input:focus { border-color: var(--primary); }
        .btn-primary { width: 100%; padding: 16px; background: linear-gradient(135deg, #3b82f6, #8b5cf6); border: none; border-radius: 14px; color: #fff; font-weight: 700; cursor: pointer; transition: var(--transition); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 150; }
        .result-card { background: rgba(255,255,255,0.03); border-radius: 16px; padding: 20px; margin-top: 20px; border-left: 4px solid var(--primary); }
        
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="lock-card" style="width: 350px;">
        <h2>Drain Panel</h2>
        <input type="email" id="auth-email" placeholder="E-posta">
        <input type="password" id="auth-pass" placeholder="Şifre">
        <button class="btn-primary" onclick="login()" style="margin-bottom: 10px;">Giriş Yap</button>
        <button class="btn-primary" onclick="register()" style="background: transparent; border: 1px solid var(--primary);">Kayıt Ol</button>
    </div>
</div>

<div id="join-lock">
    <div class="lock-card">
        <i class="fab fa-telegram" style="font-size: 50px; color: var(--primary); margin-bottom: 20px;"></i>
        <h2>Kanal Onayı</h2>
        <p style="color: var(--text-dim); font-size: 14px; margin-bottom: 24px;">Lütfen duyuru kanalımıza katılın.</p>
        <a href="https://t.me/drainpanelduyuru" target="_blank" onclick="enableVerifyBtn()" class="btn-primary" style="text-decoration: none; display: block; margin-bottom: 12px;">1. Kanala Katıl</a>
        <button id="verify-btn" onclick="unlockPanel()" disabled style="opacity: 0.5; background: #1e293b;" class="btn-primary">2. Katıldım, Paneli Aç</button>
    </div>
</div>

<nav class="navbar">
    <i class="fas fa-bars-staggered menu-toggle" onclick="toggleSidebar()"></i>
    <span class="brand">DRAİN PANEL</span>
</nav>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<aside class="sidebar" id="sidebar">
    <div class="sidebar-user">
        <div class="avatar"><i class="fas fa-user"></i></div>
        <div>
            <div id="user-email-display" style="font-weight: 800; font-size: 11px; word-break: break-all;">Yükleniyor...</div>
        </div>
    </div>
    
    <div class="nav-link active" onclick="showWelcome()"><i class="fas fa-house-chimney"></i> Ana Sayfa</div>
    
    <div class="sidebar-label">Sorgulamalar</div>
    <div class="nav-link" onclick="openPanel('adsoyad', 'Ad Soyad Sorgulama', 'Ad Girin...')"><i class="fas fa-magnifying-glass"></i> Ad Soyad</div>
    <div class="nav-link" onclick="openPanel('adres.php?tc=', 'Adres Sorgulama', 'TC Girin...')"><i class="fas fa-location-dot"></i> Adres Sorgu</div>
    <div class="nav-link" onclick="openPanel('tcgsm.php?tc=', 'TC -> GSM Sorgu', 'TC Girin...')"><i class="fas fa-id-card"></i> TC'den GSM</div>
    <div class="nav-link" onclick="openPanel('gsmtc.php?gsm=', 'GSM -> TC Sorgu', 'GSM Girin...')"><i class="fas fa-phone"></i> GSM'den TC</div>
    <div class="nav-link" onclick="openPanel('sulale.php?tc=', 'Sülale Sorgu', 'TC Girin...')"><i class="fas fa-users"></i> Sülale Sorgu</div>
    
    <div class="sidebar-label">LİNKLER</div>
    <a href="https://t.me/drainpanelduyuru" target="_blank" class="nav-link" style="color: #0088cc;"><i class="fab fa-telegram"></i> Telegram</a>
    
    <div class="nav-link" onclick="logout()" style="margin-top: 20px; color: #ef4444;"><i class="fas fa-right-from-bracket"></i> Çıkış Yap</div>
</aside>

<main class="main">
    <div class="container" id="welcome-content">
        <div style="text-align: center;">
            <h1 id="welcome-title">Hoş Geldin!</h1>
            <p style="color: var(--text-dim); margin-top: 15px;">İşlem yapmak için sol menüdeki araçları kullanabilirsin.</p>
        </div>
    </div>

    <div class="container" id="search-panel" style="display: none;">
        <div class="card">
            <h2 id="panel-title" style="margin-bottom: 24px;">Sorgu</h2>
            <div id="input-fields"><input type="text" id="main-input" placeholder="TC Girin..."></div>
            <div id="advanced-fields" style="display: none;">
                <input type="text" id="fn" placeholder="Ad">
                <input type="text" id="ln" placeholder="Soyad">
                <input type="text" id="city" placeholder="Şehir">
                <input type="text" id="district" placeholder="İlçe">
            </div>
            <button class="btn-primary" onclick="executeSorgu()">Sorgula</button>
        </div>
        <div id="results"></div>
    </div>
</main>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyBgwXnQH69z1ur7___tNGB1-EZC2Wv-Ukk",
      authDomain: "panel-fe3b7.firebaseapp.com",
      databaseURL: "https://panel-fe3b7-default-rtdb.firebaseio.com",
      projectId: "panel-fe3b7",
      storageBucket: "panel-fe3b7.firebasestorage.app",
      messagingSenderId: "459707238596",
      appId: "1:459707238596:web:ba5b6a9a4308627e156191",
      measurementId: "G-FTLPWKKLGE"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    auth.onAuthStateChanged((user) => {
        if (user) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('user-email-display').innerText = user.email;
            document.getElementById('welcome-title').innerText = "Hoş Geldin, " + user.email.split('@')[0] + "!";
            if(localStorage.getItem('drain_verified') !== 'true') document.getElementById('join-lock').style.display = 'flex';
        } else {
            document.getElementById('auth-screen').style.display = 'flex';
            document.getElementById('join-lock').style.display = 'none';
        }
    });

    async function login() {
        const e = document.getElementById('auth-email').value;
        const p = document.getElementById('auth-pass').value;
        try { await auth.signInWithEmailAndPassword(e, p); } catch(e) { alert("Hata!"); }
    }

    async function register() {
        const e = document.getElementById('auth-email').value;
        const p = document.getElementById('auth-pass').value;
        try {
            const res = await auth.createUserWithEmailAndPassword(e, p);
            await db.collection("users").doc(res.user.uid).set({ email: e, date: new Date() });
            alert("Kayıt başarılı!");
        } catch(e) { alert(e.message); }
    }

    function logout() { localStorage.removeItem('drain_verified'); auth.signOut(); location.reload(); }

    let clickedJoin = false;
    function enableVerifyBtn() {
        clickedJoin = true;
        const btn = document.getElementById('verify-btn');
        btn.disabled = false; btn.style.opacity = "1"; btn.style.background = "#10b981";
    }
    function unlockPanel() {
        if(clickedJoin) {
            document.getElementById('join-lock').style.display = "none";
            localStorage.setItem('drain_verified', 'true');
        }
    }

    let activeEndpoint = "";
    function toggleSidebar() {
        const s = document.getElementById('sidebar');
        s.classList.toggle('active');
        document.getElementById('overlay').style.display = s.classList.contains('active') ? 'block' : 'none';
    }
    function showWelcome() {
        document.getElementById('welcome-content').style.display = 'block';
        document.getElementById('search-panel').style.display = 'none';
        toggleSidebar();
    }
    function openPanel(endpoint, title, placeholderText) {
        activeEndpoint = endpoint;
        document.getElementById('welcome-content').style.display = 'none';
        document.getElementById('search-panel').style.display = 'block';
        document.getElementById('panel-title').innerText = title;
        document.getElementById('main-input').placeholder = placeholderText;
        document.getElementById('results').innerHTML = ""; // Eski sorguyu temizle
        
        document.getElementById('input-fields').style.display = endpoint === 'adsoyad' ? 'none' : 'block';
        document.getElementById('advanced-fields').style.display = endpoint === 'adsoyad' ? 'block' : 'none';
        toggleSidebar();
    }

    async function executeSorgu() {
        const resArea = document.getElementById('results');
        resArea.innerHTML = "<div class='result-card'>Sorgulanıyor...</div>";
        
        let url = activeEndpoint === 'adsoyad' ? 
            `https://arastir.sbs/api/adsoyad.php?adi=${document.getElementById('fn').value}&soyadi=${document.getElementById('ln').value}&il=${document.getElementById('city').value}&ilce=${document.getElementById('district').value}` :
            `https://arastir.sbs/api/${activeEndpoint}${document.getElementById('main-input').value}`;
        
        try {
            const r = await fetch("https://corsproxy.io/?" + encodeURIComponent(url));
            const d = await r.json();
            const f = d.data || d;
            resArea.innerHTML = ""; // Sonuç gelince "Sorgulanıyor" yazısını temizle
            if(Array.isArray(f)) f.forEach(i => renderItem(i));
            else renderItem(f);
        } catch(e) { resArea.innerHTML = "<div class='result-card' style='border-color: red;'>Hata oluştu!</div>"; }
    }

    function renderItem(obj) {
        const card = document.createElement('div'); card.className = "result-card";
        let has = false;
        for(let k in obj) {
            if(["success","message"].includes(k) || !obj[k]) continue;
            has = true;
            card.innerHTML += `<div style="font-size:12px; margin-bottom:4px;"><b>${k.toUpperCase()}:</b> ${obj[k]}</div>`;
        }
        if(!has) card.innerHTML = "Sonuç bulunamadı.";
        document.getElementById('results').appendChild(card);
    }
</script>
</body>
</html>
