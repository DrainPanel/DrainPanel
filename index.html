<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>DRAİN SORGU PANELİ</title>
    <style>
        /* --- MODERN VE SICAK RENK PALETİ --- */
        :root {
            --bg-color: #f8fafc; /* Çok hafif grimsi beyaz */
            --glass-bg: rgba(255, 255, 255, 0.85);
            --primary-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --text-dark: #1e293b;
            --text-light: #64748b;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-dark);
        }

        /* --- ARKA PLAN YUMUŞAK HAREKET --- */
        .bg-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #e0e7ff 0%, #f8fafc 100%);
            z-index: -1;
        }

        .bg-blob {
            position: fixed;
            width: 500px; height: 500px;
            background: #dbeafe;
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
            animation: moveBlob 15s infinite alternate ease-in-out;
        }

        @keyframes moveBlob {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(20%, 20%); }
        }

        /* --- ANA PANEL --- */
        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            width: 100%;
            max-width: 500px;
            padding: 40px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h1 {
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 30px;
            color: var(--text-dark);
            letter-spacing: -0.5px;
        }

        /* --- GİRİŞ ALANLARI --- */
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 13px; font-weight: 600; color: var(--text-light); }

        select, input {
            width: 100%;
            padding: 12px 16px;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            color: var(--text-dark);
            font-size: 15px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-sizing: border-box;
        }

        select:focus, input:focus {
            border-color: #6366f1;
            outline: none;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        /* --- BUTON --- */
        button {
            width: 100%;
            padding: 14px;
            background: var(--primary-gradient);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.3);
            filter: brightness(1.1);
        }

        /* --- SONUÇ KARTLARI --- */
        #result-area { margin-top: 30px; }

        .result-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid #f1f5f9;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            animation: cardPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes cardPop { from { opacity: 0; scale: 0.95; } to { opacity: 1; scale: 1; } }

        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #f8fafc;
        }

        .info-item:last-child { border-bottom: none; }

        .info-key { color: var(--text-light); font-size: 13px; font-weight: 500; }
        .info-val { color: var(--text-dark); font-size: 14px; font-weight: 600; }

        .loader { text-align: center; color: var(--text-light); font-size: 14px; padding: 20px; display: none; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="bg-glow"></div>
<div class="bg-blob"></div>

<div class="container">
    <h1>DRAİN SORGU PANELİ</h1>
    
    <div class="input-group">
        <label>Sorgu Tipi</label>
        <select id="category" onchange="updateUI()">
            <option value="tcgsm.php?tc=">TC'den Telefon</option>
            <option value="sulale.php?tc=">Sülale Bilgisi</option>
            <option value="adres.php?tc=">Adres Bilgisi</option>
            <option value="adsoyad">Ad Soyad Sorgu</option>
            <option value="gsmtc.php?gsm=">Telefondan TC</option>
        </select>
    </div>

    <div id="single-input" class="input-group">
        <label id="input-label">TC Kimlik Numarası</label>
        <input type="text" id="main-val" placeholder="Sorgulanacak veriyi girin">
    </div>

    <div id="multi-input" class="input-group hidden">
        <input type="text" id="fname" placeholder="Ad" style="margin-bottom:12px">
        <input type="text" id="lname" placeholder="Soyad" style="margin-bottom:12px">
        <input type="text" id="city" placeholder="İl" style="margin-bottom:12px">
        <input type="text" id="dist" placeholder="İlçe">
    </div>

    <button onclick="startSearch()">Sorgula</button>
    
    <div id="loading" class="loader">Bilgiler getiriliyor...</div>
    <div id="result-area"></div>
</div>

<script>
    const labels = {
        "AD": "İsim", "SOYAD": "Soyisim", "TC": "T.C. No", "DOGUMTARIHI": "Doğum Tarihi",
        "NUFUSIL": "İl", "NUFUSILCE": "İlçe", "ANNEADI": "Anne Adı",
        "BABAADI": "Baba Adı", "GSM": "Telefon", "ADRES": "Adres"
    };

    function updateUI() {
        const cat = document.getElementById('category').value;
        document.getElementById('single-input').classList.toggle('hidden', cat === 'adsoyad');
        document.getElementById('multi-input').classList.toggle('hidden', cat !== 'adsoyad');
        const label = document.getElementById('input-label');
        label.innerText = cat.includes('gsm=') ? "Telefon Numarası" : "TC Kimlik Numarası";
    }

    async function startSearch() {
        const cat = document.getElementById('category').value;
        const resArea = document.getElementById('result-area');
        const loader = document.getElementById('loading');
        
        let url = "";
        if (cat === 'adsoyad') {
            url = `https://arastir.sbs/api/adsoyad.php?adi=${document.getElementById('fname').value}&soyadi=${document.getElementById('lname').value}&il=${document.getElementById('city').value}&ilce=${document.getElementById('dist').value}`;
        } else {
            const val = document.getElementById('main-val').value;
            if(!val) return;
            url = `https://arastir.sbs/api/${cat}${val}`;
        }

        resArea.innerHTML = "";
        loader.style.display = "block";

        try {
            const proxy = "https://corsproxy.io/?" + encodeURIComponent(url);
            const response = await fetch(proxy);
            const raw = await response.text();
            let data = JSON.parse(raw);
            if(data.data) data = data.data;

            loader.style.display = "none";

            if (Array.isArray(data)) {
                data.forEach(item => createCard(item));
            } else if (typeof data === 'object') {
                createCard(data);
            }
        } catch (e) {
            loader.style.display = "none";
            resArea.innerHTML = "<p style='text-align:center; color:#ef4444;'>Bilgi çekilemedi. VPN açık mı?</p>";
        }
    }

    function createCard(obj) {
        const resArea = document.getElementById('result-area');
        const card = document.createElement('div');
        card.className = "result-card";
        
        for (let key in obj) {
            let val = obj[key];
            if (["success", "status", "message"].includes(key.toLowerCase()) || !val) continue;

            if (typeof val === 'object') {
                for (let k in val) addRow(card, k, val[k]);
            } else {
                addRow(card, key, val);
            }
        }
        resArea.appendChild(card);
    }

    function addRow(parent, key, val) {
        if(typeof val === 'object') return;
        const row = document.createElement('div');
        row.className = "info-item";
        const labelText = labels[key.toUpperCase()] || key.replace(/_/g, ' ');
        row.innerHTML = `<span class="info-key">${labelText}</span><span class="info-val">${val}</span>`;
        parent.appendChild(row);
    }
</script>
</body>
</html>
